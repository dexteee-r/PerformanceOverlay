; Performance Overlay — EXEMPLE de configuration.
;
; Ce fichier sert de modèle. Le vrai fichier lu par l'app est "config.ini", créé
; automatiquement à côté de l'exécutable au premier lancement. Tu peux soit le
; laisser se créer et tout régler dans l'app (Réglages), soit copier ce fichier en
; "config.ini" et l'éditer à la main, puis « Recharger la config » depuis le tray.
;
; "config.ini" est LOCAL à ta machine : il n'est ni versionné (git) ni inclus dans
; les releases. Tes réglages perso (mosquée, micro, position…) restent donc chez toi.

[Window]
; Position de l'overlay (laisser commenté = centré par défaut)
; x = 40
; y = 40

[Performance]
refresh_interval_ms = 2000

[Theme]
; Palette d'accents : cyan | lime | amber | violet | ice
preset = cyan

[Display]
; Noyau « Flux de charge » en nuage de points 3D (false = repli 2D léger)
effect_3d = true
; Densité du nuage de points (500..32000)
sphere_density = 4200
; Continuer d'animer la sphère même sans focus (false = pause auto = économe GPU)
animate_in_background = false

[Audio]
; Sensibilité du micro (gain) qui anime la sphère (~4 faible .. 9 fort)
mic_sensitivity = 6.0
; Micro qui anime la sphère (vide = périphérique par défaut ; à choisir dans Réglages)
mic_device_id =

[Prayer]
prayer_enabled = true
prayer_use_api = true
prayer_city = Brussels
prayer_country = Belgium
; Méthode de calcul Aladhan : 2=ISNA, 3=MWL, 5=Egypt, ...
prayer_method = 2
; Horaires EXACTS d'une mosquée via mawaqit.net : colle ici le slug de l'URL
; mawaqit.net/fr/<slug> (vide = calcul Aladhan par ville ci-dessus).
; Le plus simple : le coller dans Réglages → Prière.
prayer_mosque_id =
